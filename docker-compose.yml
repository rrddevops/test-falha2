services:
  backend:
    image: node:18-bullseye
    working_dir: /app/backend
    command: sh -c "npm install --no-package-lock && npm run seed && npm run dev"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      ALLOWED_ORIGIN: http://localhost:3000
    volumes:
      - ./:/app
    ports:
      - "3001:3001"

  frontend:
    image: node:18-bullseye
    working_dir: /app/frontend
    command: sh -c "npm install --no-package-lock && npm run dev"
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend
